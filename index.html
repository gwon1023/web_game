<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beat Breaker</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #08090d;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      #app {
        display: grid;
        place-items: center;
      }

      #boot-fallback {
        color: #f5f7fb;
        text-align: center;
      }

      #boot-fallback h1 {
        margin: 0 0 16px;
        font-size: 56px;
        font-weight: 900;
      }

      #boot-fallback p {
        margin: 0;
        color: #facc15;
        font-size: 22px;
        font-weight: 700;
      }

      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="boot-fallback">
        <h1>Beat Breaker</h1>
        <p>Loading game...</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      window.setTimeout(function () {
        if (window.__BEAT_BREAKER_BOOTED__ || document.querySelector('#app canvas')) {
          return;
        }

        var app = document.getElementById('app');
        if (!app) {
          return;
        }

        var scene = 'title';

        function render() {
          if (scene === 'title') {
            app.innerHTML =
              '<div id="boot-fallback"><h1>Beat Breaker</h1><p>Press Space to start</p><p style="color:#d1d5db;font-size:20px;margin-top:28px">J - Light Attack&nbsp;&nbsp;&nbsp;K - Heavy Attack&nbsp;&nbsp;&nbsp;Space - Finisher</p></div>';
            return;
          }

          if (scene === 'play') {
            app.innerHTML =
              '<div id="boot-fallback"><h1>PLAY</h1><p id="fallback-action">Press J, K, or Space</p><p style="color:#9ca3af;font-size:18px;margin-top:28px">Esc - Result</p></div>';
            return;
          }

          app.innerHTML =
            '<div id="boot-fallback"><h1>RESULT</h1><p>Placeholder run complete</p><p style="color:#d1d5db;font-size:20px;margin-top:28px">Space - Restart&nbsp;&nbsp;&nbsp;Esc - Back to Title</p></div>';
        }

        function setAction(text) {
          var action = document.getElementById('fallback-action');
          if (action) {
            action.textContent = text;
          }
        }

        window.addEventListener('keydown', function (event) {
          if (event.code === 'Space') {
            event.preventDefault();
            if (scene === 'title' || scene === 'result') {
              scene = 'play';
              render();
              return;
            }

            setAction('Space - Finisher pressed');
          }

          if (scene === 'play' && event.code === 'KeyJ') {
            setAction('J - Light Attack pressed');
          }

          if (scene === 'play' && event.code === 'KeyK') {
            setAction('K - Heavy Attack pressed');
          }

          if (event.code === 'Escape') {
            scene = scene === 'play' ? 'result' : 'title';
            render();
          }
        });

        render();
      }, 1200);
    </script>
  </body>
</html>
